    <style>
        /*CSS=Lenguaje de programacion (Diseñar en cascada)*/
        html, body{
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif

        }
        body{
            display: flex;
            flex-direction: column;
            text-align: center;
        }
        header{
            padding: 20px;
            background-color: rgb(163, 108, 213);
            color: azure;
        }
        main{
            flex: 1;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            background-color: rgb(224, 216, 242);
        }
        main {
    flex: 1;
    padding: 20px;
    width: 90%;      
    max-width: 1400px; 
    margin: 0 auto;
    background-color: rgb(224, 216, 242);
}
        footer{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px ;
            border-top: 1px solid rgb(127, 176, 244);
            background-color: azure;
        }
        footer img {
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        footer img:hover {
            transform: scale(1.2);
        }
        
        @media (max-widtht: 600px){
            footer{ 
                flex-direction: column;
                gap: 15px;
                padding: 20px;
                }
            
        }
        /* Esto crea el diseño de la tarjeta */
.semana {
    background-color: white; 
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 20px;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
    border-left: 5px solid rgb(163, 108, 213);
    text-align: left;
}

/* Esto le da color al título dentro de la tarjeta */
.semana h3 {
    margin: 0 0 10px 0;
    color: rgb(163, 108, 213);
}
            header h1{

                    0 0 20px rgb(165, 235, 128),
                    0 0 40px rgb(123, 245, 79);
            
            }
        

    </style>
